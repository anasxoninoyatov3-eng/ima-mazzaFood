<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Mazza Food App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        :root {
            --accent: #ff6b35;
            --dark: #1a1a1a;
            --bg: #fdfbf7;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--dark);
        }
        .download-card {
            background: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
            animation: fadeInUp 0.8s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .app-icon {
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
        }
        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            padding: 16px 32px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(255, 107, 53, 0.3);
        }
        .download-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(255, 107, 53, 0.4);
            filter: brightness(1.1);
        }
        .back-link {
            display: block;
            margin-top: 20px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <div class="download-card">
        <img src="https://cdn-icons-png.flaticon.com/512/3075/3075929.png" alt="Mazza Food Icon" class="app-icon">
        <h1>Mazza Food App</h1>
        <p>Скачайте наше официальное приложение для Android, чтобы заказывать любимую еду еще быстрее!</p>
        
        <a href="MazzaFood.apk" download class="download-btn">
            <i class="fa-solid fa-file-arrow-down"></i> Скачать APK
        </a>
        
        <button onclick="window.installMazzaApp()" class="download-btn" style="background: #2ecc71; margin-top: 15px; cursor: pointer; border: none; width: 100%; justify-content: center;">
            <i class="fa-solid fa-mobile-screen-button"></i> Установить PWA
        </button>

        <a href="index.html" class="back-link">← Вернуться на сайт</a>
    </div>
    <script type="module" src="js/app.js"></script>
</body>
</html>
